name: Clone Public Repo

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      ARGS:
        description: "排班参数用逗号分隔: 0 表示休息 1 表示上班 2 表示夜班 3 表示备班"
        required: false
        type: string
        default: ""

jobs:
  clone_repo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # ssh-key: $ {{secrets.MYPY_TOKEN }}
          token: ${{ secrets.MYPY_ACCESS_TOKEN }}
          repository: M-Kepler/Python
          # path: ./.github/actions/Python # 如果您想要检出到特定路径，请取消注释这一行

      - name: test
        run: |
          ls -al ./.github/actions/

      - name: Run My Action
        uses: ./.github/actions/my-action # 确保这里的路径指向包含 action.yml 的目录
        with:
          APP: qlx_work_schedules
          ARGS: ${{ inputs.ARGS }}
          SIMPLE_RUN: true
