name: 02. 🦞 app_openclaw

on:
  workflow_dispatch:
    inputs:
      OPENCLAW_VERSION:
        type: string
        description: "版本，比如: latest 或 2026.3.24"
        required: false
        default: "2026.4.5"

env:
  ENV_IN_GITHUBACTION: true

jobs:
  start_openclaw:
    runs-on: "ubuntu-latest"
    steps:
      - name: 设置时区
        uses: szenius/set-timezone@v2.0
        with:
          timezoneLinux: "Asia/Shanghai"
          timezoneWindows: "China Standard Time"

      - name: 配置 SSH key
        # https://stackoverflow.com/questions/75578151/how-do-i-clone-a-repo-in-b-repo-github-actions-if-two-repo-is-in-same-organizati
        # NOTICE: 也可以手动在 github actions 里拉取，不过要用 https 协议，而且提交的时候需要进行账密认证
        # 而通过以下方式这不需要账密认证
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY }}
          name: id_rsa
          known_hosts: "github.com" # ${{ secrets.KNOWN_HOSTS }}
          if_key_exists: fail # replace / ignore / fail; optional (defaults to fail)

      - name: 配置 git 账号
        run: |
          git config --global user.name "actions-user"
          git config --global user.email "actions-user@github.com"
          git config --global --list

      - name: 设置 Nodejs 环境
        uses: actions/setup-node@v6
        with:
          # Version Spec of the version to use in SemVer notation.
          # It also admits such aliases as lts/*, latest, nightly and canary builds
          # Examples: 12.x, 10.15.1, >=10.15.0, lts/Hydrogen, 16-nightly, latest, node
          node-version: ">=22.14.0"

      # https://github.com/marketplace/actions/setup-cloudflared
      # 安装 cloudflared
      - name: Setup cloudflared
        uses: AnimMouse/setup-cloudflared@v2

      # 配置 tunnel （现在这一步放到 openclaw/init.sh 里了）
      # - name: Setup cloudflared tunnel
      #   uses: AnimMouse/setup-cloudflared/tunnel@v2
      #   with:
      #     url: http://localhost:18790

      - name: 🦞 设置 dotfiles 配置并启动 OpenClaw
        continue-on-error: true # 即使失败了也继续后续流程
        run: |
          git clone git@github.com:M-Kepler/dotfiles ~/dotfiles
          cd ~/dotfiles
          # 加环境变量后启动
          export ENABLE_OPENCLAW=true && export OPENCLAW_VERSION=${{inputs.OPENCLAW_VERSION}} && bash setup.sh

      ##################################################
      # 内网穿透
      ##################################################
      # - uses: fawazahmed0/action-debug@main
      # wordsworth-mk/action-debug@main 会检查是否有文件标记，有的话退出
      - name: 创建退出 ssh 脚本
        run: |
          # 一键退出
          echo "touch $GITHUB_WORKSPACE/continue && echo '即将退出 github action 服务器'" > ~/quit-ssh
          chmod a+x ~/quit-ssh

      - uses: wordsworth-mk/action-debug@main
        continue-on-error: true # 即使失败了也继续后续流程
        with:
          credentials: "1:1" # 登录用户名和密码
          loop_wait: true # 是否在这里死循环等待退出
